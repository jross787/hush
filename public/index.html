<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hush</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- static film grain — the "fuzzy" paper texture -->
  <svg class="grain" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain-f">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-f)"/>
  </svg>

  <!-- one slow drifting warmth, barely there -->
  <div class="fog" aria-hidden="true"></div>

  <div class="wordmark" aria-hidden="true">hush</div>

  <!-- running head — like the faint line atop a book page -->
  <div id="runhead" aria-hidden="true"></div>

  <main id="stage" aria-live="polite"></main>

  <footer id="footer">
    <button class="quiet" id="enough">enough questions — just answer</button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
